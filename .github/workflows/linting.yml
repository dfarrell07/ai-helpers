---
name: Linting

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          find skills -type f -name "*.sh" -exec shellcheck -S warning {} +

  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Run markdownlint
        run: |
          npx markdownlint-cli2 "**/*.md" "#node_modules"

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint --strict .

  gitlint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install gitlint
        run: pip install gitlint

      - name: Run gitlint
        run: gitlint --commits origin/main..HEAD
